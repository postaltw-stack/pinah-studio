<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinah Arquitetura — Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F4EF; --warm: #FDFBF8; --charcoal: #1C1A17; --muted: #7A7670;
  --border: #E4E0D8; --accent: #2D6A4F; --accent-light: #E8F3EE;
  --amber: #C4862A; --amber-light: #FBF3E7; --coral: #B85C38;
  --coral-light: #FAF0EC; --sand: #C9B99A;
}
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; font-size: 14px; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 260px; min-width: 260px; background: var(--charcoal); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-logo h1 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--cream); letter-spacing: 0.02em; }
.sidebar-logo p { font-size: 11px; color: var(--sand); margin-top: 2px; }
.sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--sand); margin-top: 6px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }
.sync-dot.offline { background: #F44336; }
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.new-project-btn { margin: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s; width: calc(100% - 32px); }
.new-project-btn:hover { background: #245C42; }
.sidebar-section { padding: 0 16px 8px; }
.sidebar-section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: var(--sand); text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
.project-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
.project-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; transition: all 0.15s; border: 1px solid transparent; position: relative; }
.project-item:hover { background: rgba(255,255,255,0.06); }
.project-item.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.1); }
.project-item-name { font-size: 13px; color: rgba(255,255,255,0.85); padding-right: 20px; }
.project-item-meta { font-size: 11px; color: var(--sand); margin-top: 2px; }
.project-item-dots { display: flex; gap: 4px; margin-top: 6px; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-before { background: var(--coral); } .dot-during { background: var(--amber); } .dot-after { background: var(--accent); } .dot-empty { background: rgba(255,255,255,0.15); }
.delete-proj { position: absolute; top: 8px; right: 8px; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 14px; display: none; line-height: 1; padding: 2px 4px; }
.project-item:hover .delete-proj { display: block; }
.delete-proj:hover { color: #F44336; }
.sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: auto; }
.sidebar-btn { width: 100%; text-align: left; background: none; border: none; color: rgba(255,255,255,0.6); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.15s; }
.sidebar-btn:hover { background: rgba(255,255,255,0.07); color: white; }

/* MAIN */
.main { flex: 1; overflow-y: auto; background: var(--warm); }
.main-header { padding: 28px 36px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--warm); z-index: 10; }
.main-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; font-style: italic; }
.main-header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
.generate-btn { background: var(--charcoal); color: white; border: none; border-radius: 10px; padding: 12px 22px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; white-space: nowrap; }
.generate-btn:hover:not(:disabled) { background: #333; transform: translateY(-1px); }
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.generate-btn.loading .spinner { display: block; }
.generate-btn.loading .btn-label { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }
.main-body { padding: 28px 36px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; display: none; }
.progress-bar.visible { display: block; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.5s ease; }

/* LOADING */
.loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
.loading-overlay p { font-size: 14px; color: var(--muted); }
.big-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

/* EMPTY */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; gap: 12px; }
.empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; color: var(--muted); }
.empty-state p { font-size: 13px; color: var(--muted); }

/* FOLDERS */
.folders-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; margin-bottom: 32px; }
.folder-card { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: box-shadow 0.2s; }
.folder-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.folder-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.folder-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.badge-before { background: var(--coral-light); color: var(--coral); }
.badge-during { background: var(--amber-light); color: var(--amber); }
.badge-after { background: var(--accent-light); color: var(--accent); }
.folder-count { font-size: 12px; color: var(--muted); }
.folder-body { padding: 14px; }
.folder-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
.img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
.img-thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: var(--cream); position: relative; }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-thumb .remove-img { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.65); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 9px; cursor: pointer; display: none; align-items: center; justify-content: center; }
.img-thumb:hover .remove-img { display: flex; }
.more-photos { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.upload-zone { border: 1.5px dashed var(--border); border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.2s; color: var(--muted); font-size: 12px; display: block; }
.upload-zone:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.upload-zone input { display: none; }
.upload-zone.disabled { opacity: 0.5; pointer-events: none; }

/* UPLOAD PROGRESS */
.upload-progress { margin-bottom: 10px; }
.upload-progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.upload-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.upload-status { font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 6px; }
.upload-status .mini-spin { width: 10px; height: 10px; border: 1.5px solid rgba(45,106,79,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

/* OUTPUT */
.content-output { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.output-header h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; }
.output-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.output-tab { padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); cursor: pointer; background: white; color: var(--muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.output-tab.active { background: var(--charcoal); color: white; border-color: var(--charcoal); }
.output-panels > div { display: none; }
.output-panels > div.active { display: block; }
.content-block { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.content-block-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.content-text { font-size: 14px; line-height: 1.9; color: var(--charcoal); white-space: pre-line; }
.hashtag-text { color: #2D6A4F; font-size: 13px; line-height: 2.2; }
.copy-row { display: flex; justify-content: flex-end; margin-top: 14px; }
.copy-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; color: var(--muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.reels-step { display: flex; gap: 14px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
.reels-step:last-child { border-bottom: none; padding-bottom: 0; }
.step-time { background: var(--charcoal); color: white; font-size: 11px; padding: 3px 8px; border-radius: 6px; white-space: nowrap; font-weight: 500; min-width: 56px; text-align: center; flex-shrink: 0; }
.step-desc { font-size: 13px; line-height: 1.6; }
.story-slide { background: var(--cream); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.story-slide:last-child { margin-bottom: 0; }
.story-slide-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.story-num { background: var(--charcoal); color: white; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
.story-title { font-size: 13px; font-weight: 500; }
.story-text { font-size: 13px; line-height: 1.6; }
.story-action { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 16px; padding: 28px; width: 420px; max-width: 90vw; }
.modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--charcoal); outline: none; transition: border 0.15s; background: var(--warm); }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 72px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
.btn-cancel { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border); background: white; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; }
.btn-confirm { padding: 10px 20px; border-radius: 10px; border: none; background: var(--charcoal); color: white; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; }
.api-notice { background: var(--amber-light); border: 1px solid #E8C87A; border-radius: 10px; padding: 12px 16px; font-size: 12px; color: #7A5A1A; line-height: 1.6; margin-bottom: 16px; }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--charcoal); color: white; padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Pinah</h1>
      <p>Arquitetura — Studio</p>
      <div class="sync-indicator">
        <div class="sync-dot syncing" id="syncDot"></div>
        <span id="syncLabel">Conectando...</span>
      </div>
    </div>
    <button class="new-project-btn" onclick="openModal('newProjectModal')">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      Novo Projeto
    </button>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Projetos</div>
    </div>
    <div class="project-list" id="projectList"></div>
    <div class="sidebar-footer">
      <button class="sidebar-btn" onclick="openModal('apiKeyModal')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5" cy="6.5" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M7 6.5h5M9.5 5.2v1.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Configurar API Key
      </button>
    </div>
  </aside>

  <main class="main" id="mainArea">
    <div class="loading-overlay">
      <div class="big-spinner"></div>
      <p>Conectando ao banco de dados...</p>
    </div>
  </main>
</div>

<!-- MODAL NOVO PROJETO -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <h3>Novo Projeto</h3>
    <div class="form-group">
      <label>Nome do projeto</label>
      <input type="text" id="projName" placeholder="Ex: Cozinha Integrada — Família Silva"/>
    </div>
    <div class="form-group">
      <label>Tipo de ambiente</label>
      <select id="projType">
        <option value="cozinha">Cozinha</option>
        <option value="sala">Sala de estar</option>
        <option value="quarto">Quarto</option>
        <option value="banheiro">Banheiro</option>
        <option value="area_externa">Área externa / Fachada</option>
        <option value="completo">Apartamento completo</option>
        <option value="outro">Outro</option>
      </select>
    </div>
    <div class="form-group">
      <label>Estilo do projeto</label>
      <select id="projStyle">
        <option value="moderno minimalista">Moderno / Minimalista</option>
        <option value="clássico tradicional">Clássico / Tradicional</option>
        <option value="rústico industrial">Rústico / Industrial</option>
        <option value="tropical natural">Tropical / Natural</option>
        <option value="contemporâneo">Contemporâneo</option>
      </select>
    </div>
    <div class="form-group">
      <label>Observações (opcional)</label>
      <textarea id="projNotes" placeholder="Ex: Parede derrubada, ilha central, marcenaria planejada..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('newProjectModal')">Cancelar</button>
      <button class="btn-confirm" onclick="createProject()">Criar Projeto</button>
    </div>
  </div>
</div>

<!-- MODAL API KEY -->
<div class="modal-overlay" id="apiKeyModal">
  <div class="modal">
    <h3>API Key da Anthropic</h3>
    <div class="api-notice">A chave é salva apenas no seu navegador. Nunca passa por terceiros — vai direto para a Anthropic.</div>
    <div class="form-group">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..."/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('apiKeyModal')">Cancelar</button>
      <button class="btn-confirm" onclick="saveApiKey()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── CONFIG ──
const CLOUDINARY_CLOUD = 'dvoputqul';
const CLOUDINARY_PRESET = 'ml_default';
const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`;

const firebaseConfig = {
  apiKey: "AIzaSyAeKJFhtPupzuxLB5FyVGzVIUnv6-JdjZQ",
  authDomain: "pinah-studio.firebaseapp.com",
  projectId: "pinah-studio",
  storageBucket: "pinah-studio.firebasestorage.app",
  messagingSenderId: "102572823069",
  appId: "1:102572823069:web:47857c887d01d5886d2cf4",
  databaseURL: "https://pinah-studio-default-rtdb.firebaseio.com"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ── STATE ──
let projects = {};
let active = null;
let apiKey = localStorage.getItem('pinah_api_key') || '';
const typeMap = { cozinha:'Cozinha', sala:'Sala', quarto:'Quarto', banheiro:'Banheiro', area_externa:'Área externa', completo:'Apartamento', outro:'Outro' };

// ── UI HELPERS ──
function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (s==='online') { dot.className='sync-dot'; lbl.textContent='Sincronizado'; }
  else if (s==='syncing') { dot.className='sync-dot syncing'; lbl.textContent='Sincronizando...'; }
  else { dot.className='sync-dot offline'; lbl.textContent='Sem conexão'; }
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
window.openModal = openModal;
window.closeModal = closeModal;

function saveApiKey() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('pinah_api_key', apiKey);
  closeModal('apiKeyModal'); toast('API Key salva!');
}
window.saveApiKey = saveApiKey;

// ── FIREBASE REALTIME ──
onValue(ref(db, 'projects'), (snap) => {
  projects = snap.val() || {};
  setSyncStatus('online');
  renderSidebar();
  if (active && projects[active.id]) { active = projects[active.id]; renderMain(); }
  else if (active && !projects[active.id]) { active = null; showEmpty(); }
  else if (!active) showEmpty();
}, () => { setSyncStatus('offline'); showEmpty(); });

function showEmpty() {
  document.getElementById('mainArea').innerHTML = `
    <div class="empty-state">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" style="opacity:0.18"><rect x="7" y="14" width="42" height="32" rx="4" stroke="#1C1A17" stroke-width="2"/><path d="M7 22h42M18 14v8M38 14v8" stroke="#1C1A17" stroke-width="2"/><circle cx="28" cy="35" r="5" stroke="#1C1A17" stroke-width="2"/></svg>
      <h3>Selecione ou crie um projeto</h3>
      <p>Organize as fotos e gere conteúdo para o Instagram com 1 clique</p>
    </div>`;
}

// ── SIDEBAR ──
function renderSidebar() {
  const el = document.getElementById('projectList');
  const list = Object.values(projects).sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
  if (!list.length) { el.innerHTML = '<p style="font-size:12px;color:#888;padding:8px 12px;">Nenhum projeto ainda</p>'; return; }
  el.innerHTML = list.map(p => `
    <div class="project-item ${active?.id===p.id?'active':''}" onclick="selectProject('${p.id}')">
      <div class="project-item-name">${p.name}</div>
      <div class="project-item-meta">${typeMap[p.type]||p.type} · ${p.style}</div>
      <div class="project-item-dots">
        <div class="dot ${(p.folders?.before||[]).length?'dot-before':'dot-empty'}"></div>
        <div class="dot ${(p.folders?.during||[]).length?'dot-during':'dot-empty'}"></div>
        <div class="dot ${(p.folders?.after||[]).length?'dot-after':'dot-empty'}"></div>
      </div>
      <button class="delete-proj" onclick="deleteProject(event,'${p.id}')">✕</button>
    </div>`).join('');
}

// ── PROJECTS ──
function createProject() {
  const name = document.getElementById('projName').value.trim();
  if (!name) { alert('Digite um nome para o projeto.'); return; }
  const id = Date.now().toString();
  const p = { id, name, type: document.getElementById('projType').value, style: document.getElementById('projStyle').value, notes: document.getElementById('projNotes').value.trim(), folders: { before: [], during: [], after: [] }, content: null, createdAt: Date.now() };
  setSyncStatus('syncing');
  set(ref(db, `projects/${id}`), p).then(() => { setSyncStatus('online'); toast('Projeto criado!'); });
  document.getElementById('projName').value = '';
  document.getElementById('projNotes').value = '';
  closeModal('newProjectModal');
}
window.createProject = createProject;

function deleteProject(e, id) {
  e.stopPropagation();
  if (!confirm('Excluir este projeto?')) return;
  setSyncStatus('syncing');
  remove(ref(db, `projects/${id}`)).then(() => { setSyncStatus('online'); toast('Projeto excluído.'); });
  if (active?.id === id) { active = null; showEmpty(); }
}
window.deleteProject = deleteProject;

function selectProject(id) {
  active = projects[id];
  renderSidebar();
  renderMain();
}
window.selectProject = selectProject;

// ── MAIN RENDER ──
function renderMain() {
  if (!active) return;
  const canGen = (active.folders?.before||[]).length > 0 && (active.folders?.after||[]).length > 0;
  document.getElementById('mainArea').innerHTML = `
    <div class="main-header">
      <div>
        <h2>${active.name}</h2>
        <p>${typeMap[active.type]||active.type} &middot; ${active.style}${active.notes?' &middot; '+active.notes:''}</p>
      </div>
      <button class="generate-btn" id="genBtn" onclick="generate()" ${canGen?'':'disabled'}>
        <div class="spinner"></div>
        <span class="btn-label">✦ ${canGen?'Gerar Conteúdo com IA':'Adicione fotos para gerar'}</span>
      </button>
    </div>
    <div class="main-body">
      <div class="progress-bar" id="pbar"><div class="progress-fill" id="pfill"></div></div>
      <div class="folders-grid">
        ${folder('before','Antes','badge-before','Fotos do ambiente antes da reforma')}
        ${folder('during','Em obra','badge-during','Registro do processo e da obra')}
        ${folder('after','Pronto','badge-after','Fotos do resultado final (ou render)')}
      </div>
      <div id="outputArea">${active.content ? outputHTML(active.content) : ''}</div>
    </div>`;
}

function folder(key, label, badge, desc) {
  const imgs = active.folders?.[key] || [];
  const thumbs = imgs.slice(0,9).map((url,i) => `
    <div class="img-thumb">
      <img src="${url}" loading="lazy"/>
      <button class="remove-img" onclick="removeImg('${key}',${i})">✕</button>
    </div>`).join('');
  const more = imgs.length > 9 ? `<p class="more-photos">+${imgs.length-9} fotos</p>` : '';
  return `
  <div class="folder-card">
    <div class="folder-header">
      <span class="folder-badge ${badge}">${label}</span>
      <span class="folder-count">${imgs.length} foto${imgs.length!==1?'s':''}</span>
    </div>
    <div class="folder-body">
      <p class="folder-desc">${desc}</p>
      ${thumbs?`<div class="img-grid">${thumbs}</div>${more}`:''}
      <div id="uprog-${key}"></div>
      <label class="upload-zone" id="uzone-${key}">
        <input type="file" accept="image/*" multiple onchange="addImgs('${key}',this)"/>
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="margin:0 auto 5px;display:block"><path d="M7.5 2v8M5 4.5L7.5 2l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11v1.5A1.5 1.5 0 003.5 14h8a1.5 1.5 0 001.5-1.5V11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Adicionar fotos
      </label>
    </div>
  </div>`;
}

// ── CLOUDINARY UPLOAD ──
async function uploadToCloudinary(file, onProgress) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  formData.append('folder', `pinah-studio/${active.id}`);

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', CLOUDINARY_URL);
    xhr.upload.onprogress = e => { if (e.lengthComputable) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => {
      const res = JSON.parse(xhr.responseText);
      if (res.secure_url) resolve(res.secure_url);
      else reject(new Error(res.error?.message || 'Upload falhou'));
    };
    xhr.onerror = () => reject(new Error('Erro de rede'));
    xhr.send(formData);
  });
}

async function addImgs(key, input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  const zone = document.getElementById(`uzone-${key}`);
  const prog = document.getElementById(`uprog-${key}`);
  zone.classList.add('disabled');

  const newUrls = [...(active.folders?.[key] || [])];

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    prog.innerHTML = `
      <div class="upload-progress">
        <div class="upload-status">
          <div class="mini-spin"></div>
          Enviando foto ${i+1} de ${files.length}...
        </div>
        <div class="upload-progress-bar">
          <div class="upload-progress-fill" id="upfill-${key}" style="width:0%"></div>
        </div>
      </div>`;

    try {
      const url = await uploadToCloudinary(file, pct => {
        const fill = document.getElementById(`upfill-${key}`);
        if (fill) fill.style.width = pct + '%';
      });
      newUrls.push(url);
    } catch(e) {
      toast(`Erro no upload: ${e.message}`);
    }
  }

  active.folders[key] = newUrls;
  setSyncStatus('syncing');
  await update(ref(db, `projects/${active.id}/folders`), { [key]: newUrls });
  setSyncStatus('online');
  toast(`${files.length} foto(s) enviada(s) com sucesso!`);
  renderMain();
}
window.addImgs = addImgs;

function removeImg(key, idx) {
  const imgs = [...(active.folders?.[key] || [])];
  imgs.splice(idx, 1);
  active.folders[key] = imgs;
  setSyncStatus('syncing');
  update(ref(db, `projects/${active.id}/folders`), { [key]: imgs })
    .then(() => { setSyncStatus('online'); renderMain(); });
}
window.removeImg = removeImg;

// ── GENERATE AI ──
async function generate() {
  if (!active) return;
  if (!apiKey) { alert('Configure sua API Key primeiro.'); openModal('apiKeyModal'); return; }
  const btn = document.getElementById('genBtn');
  const pbar = document.getElementById('pbar');
  const pfill = document.getElementById('pfill');
  btn.classList.add('loading'); btn.disabled = true;
  pbar.classList.add('visible'); pfill.style.width = '15%';

  const prompt = `Você é especialista em marketing para arquitetura e design de interiores.
Crie conteúdo completo para Instagram para este projeto de antes x depois:

PROJETO: ${active.name}
AMBIENTE: ${typeMap[active.type]||active.type}
ESTILO: ${active.style}
OBSERVAÇÕES: ${active.notes||'Nenhuma'}
FOTOS ANTES: ${(active.folders?.before||[]).length}
FOTOS EM OBRA: ${(active.folders?.during||[]).length}
FOTOS PRONTO: ${(active.folders?.after||[]).length}

Responda APENAS com JSON válido, sem markdown:
{
  "legenda": "legenda completa ~150 palavras, tom humano inspirador, emojis, CTA para direct no final",
  "hashtags": "28 hashtags separadas por espaço, mix português/inglês, incluir #pinaharquitetura #arquitetacuritiba",
  "reels": [
    {"tempo":"0–3s","descricao":"cena"},
    {"tempo":"3–8s","descricao":"cena"},
    {"tempo":"8–18s","descricao":"cena"},
    {"tempo":"18–25s","descricao":"cena"},
    {"tempo":"25–30s","descricao":"cena"}
  ],
  "stories": [
    {"slide":1,"titulo":"título","texto":"texto do slide","acao":"ação sugerida"},
    {"slide":2,"titulo":"título","texto":"texto","acao":"ação"},
    {"slide":3,"titulo":"título","texto":"texto","acao":"ação"},
    {"slide":4,"titulo":"título","texto":"texto","acao":"ação"}
  ]
}`;

  try {
    pfill.style.width = '45%';
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, messages: [{ role: 'user', content: prompt }] })
    });
    pfill.style.width = '80%';
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content.map(c => c.text||'').join('').replace(/```json|```/g,'').trim();
    const content = JSON.parse(raw);
    pfill.style.width = '100%';
    active.content = content;
    setSyncStatus('syncing');
    await update(ref(db, `projects/${active.id}`), { content });
    setSyncStatus('online');
    setTimeout(() => {
      pbar.classList.remove('visible'); pfill.style.width='0%';
      btn.classList.remove('loading'); btn.disabled = false;
      document.getElementById('outputArea').innerHTML = outputHTML(content);
      toast('Conteúdo gerado com sucesso! ✦');
    }, 400);
  } catch(e) {
    pbar.classList.remove('visible'); pfill.style.width='0%';
    btn.classList.remove('loading'); btn.disabled = false;
    alert('Erro: ' + e.message);
  }
}
window.generate = generate;

// ── OUTPUT ──
function outputHTML(c) {
  const reelsRows = (c.reels||[]).map(r => `
    <div class="reels-step">
      <span class="step-time">${r.tempo}</span>
      <span class="step-desc">${r.descricao}</span>
    </div>`).join('');
  const storiesRows = (c.stories||[]).map(s => `
    <div class="story-slide">
      <div class="story-slide-header">
        <span class="story-num">Slide ${s.slide}</span>
        <span class="story-title">${s.titulo}</span>
      </div>
      <p class="story-text">${s.texto}</p>
      <p class="story-action">↗ ${s.acao}</p>
    </div>`).join('');
  const leg = (c.legenda||'').replace(/</g,'&lt;');
  const hash = (c.hashtags||'').replace(/</g,'&lt;');
  return `
  <div class="content-output">
    <div class="output-header">
      <h3>Conteúdo gerado ✦</h3>
      <div class="output-tabs">
        <button class="output-tab active" onclick="tab(this,'t-leg')">Legenda</button>
        <button class="output-tab" onclick="tab(this,'t-hash')">Hashtags</button>
        <button class="output-tab" onclick="tab(this,'t-reels')">Reels</button>
        <button class="output-tab" onclick="tab(this,'t-stories')">Stories</button>
      </div>
    </div>
    <div class="output-panels">
      <div id="t-leg" class="active">
        <div class="content-block">
          <div class="content-block-label">Legenda Instagram</div>
          <div class="content-text">${leg}</div>
          <div class="copy-row"><button class="copy-btn" onclick="cp(this,${JSON.stringify(c.legenda||'')})">Copiar legenda</button></div>
        </div>
      </div>
      <div id="t-hash">
        <div class="content-block">
          <div class="content-block-label">Hashtags</div>
          <div class="hashtag-text">${hash}</div>
          <div class="copy-row"><button class="copy-btn" onclick="cp(this,${JSON.stringify(c.hashtags||'')})">Copiar hashtags</button></div>
        </div>
      </div>
      <div id="t-reels">
        <div class="content-block">
          <div class="content-block-label">Roteiro de Reels — Antes x Depois</div>
          ${reelsRows}
          <div class="copy-row"><button class="copy-btn" onclick="cpReels()">Copiar roteiro</button></div>
        </div>
      </div>
      <div id="t-stories">
        <div class="content-block">
          <div class="content-block-label">Sequência de Stories (4 slides)</div>
          ${storiesRows}
        </div>
      </div>
    </div>
  </div>`;
}
window.outputHTML = outputHTML;

function tab(btn, id) {
  document.querySelectorAll('.output-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.output-panels > div').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}
window.tab = tab;

function cp(btn, text) {
  navigator.clipboard.writeText(text).then(()=>{ const o=btn.textContent; btn.textContent='Copiado!'; setTimeout(()=>btn.textContent=o,2000); });
}
window.cp = cp;

function cpReels() {
  if (!active?.content?.reels) return;
  const t = active.content.reels.map(r=>`${r.tempo}: ${r.descricao}`).join('\n');
  navigator.clipboard.writeText(t).then(()=>toast('Roteiro copiado!'));
}
window.cpReels = cpReels;

document.getElementById('apiKeyInput').value = apiKey;
</script>
</body>
</html>
